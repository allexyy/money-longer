<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Finance Tracker — Дашборд</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&family=Instrument+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0e0f11; --surface: #16181c; --surface2: #1e2127;
      --border: #2a2d35; --text: #e8e6e0; --muted: #6b6f7a;
      --accent: #c8f060; --accent2: #f0a060; --accent3: #60b8f0; --danger: #f06060;
      --radius: 14px;
      --font-head: 'DM Serif Display', serif;
      --font-body: 'Instrument Sans', sans-serif;
      --font-mono: 'DM Mono', monospace;
    }
    html { font-size: 16px; }
    body { background: var(--bg); color: var(--text); font-family: var(--font-body); min-height: 100vh; display: flex; }

    .sidebar { width: 220px; min-height: 100vh; background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; padding: 28px 0; flex-shrink: 0; position: sticky; top: 0; height: 100vh; }
    .logo { padding: 0 24px 32px; font-family: var(--font-head); font-size: 22px; letter-spacing: -0.5px; }
    .logo span { color: var(--accent); }
    .nav-group { padding: 0 12px; flex: 1; }
    .nav-label { font-size: 10px; font-weight: 600; letter-spacing: 1.5px; text-transform: uppercase; color: var(--muted); padding: 0 12px 8px; }
    .nav-item { display: flex; align-items: center; gap: 10px; padding: 9px 12px; border-radius: 8px; font-size: 13.5px; font-weight: 500; color: var(--muted); text-decoration: none; transition: all 0.15s; margin-bottom: 2px; }
    .nav-item:hover { background: var(--surface2); color: var(--text); }
    .nav-item.active { background: var(--accent); color: #0e0f11; }
    .nav-item .icon { font-size: 16px; width: 20px; text-align: center; }
    .nav-sep { height: 1px; background: var(--border); margin: 12px 12px; }
    .sidebar-bottom { padding: 0 12px; }
    .user-card { display: flex; align-items: center; gap: 10px; padding: 10px 12px; border-radius: 8px; background: var(--surface2); }
    .avatar { width: 32px; height: 32px; border-radius: 50%; background: var(--accent); display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 600; color: #0e0f11; flex-shrink: 0; }
    .user-name { font-size: 13px; font-weight: 500; }
    .user-sub { font-size: 11px; color: var(--muted); }

    .main { flex: 1; padding: 36px 40px; overflow-y: auto; }
    .page-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 36px; }
    .page-title { font-family: var(--font-head); font-size: 32px; letter-spacing: -1px; line-height: 1.1; }
    .page-title .sub { font-family: var(--font-body); font-size: 13px; font-weight: 400; color: var(--muted); display: block; margin-top: 4px; letter-spacing: 0; }

    .month-picker { display: flex; align-items: center; gap: 4px; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 4px; }
    .month-picker button { background: none; border: none; color: var(--muted); cursor: pointer; padding: 6px 10px; border-radius: 7px; font-size: 14px; transition: all 0.15s; }
    .month-picker button:hover { background: var(--surface2); color: var(--text); }
    .month-picker .cur-month { font-family: var(--font-mono); font-size: 13px; color: var(--text); padding: 0 8px; }

    .kpi-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 28px; }
    .kpi-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; position: relative; overflow: hidden; }
    .kpi-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px; }
    .kpi-card.green::before  { background: var(--accent); }
    .kpi-card.orange::before { background: var(--accent2); }
    .kpi-card.blue::before   { background: var(--accent3); }
    .kpi-card.red::before    { background: var(--danger); }
    .kpi-label { font-size: 11.5px; color: var(--muted); font-weight: 500; letter-spacing: 0.3px; margin-bottom: 10px; }
    .kpi-value { font-family: var(--font-head); font-size: 28px; letter-spacing: -1px; line-height: 1; margin-bottom: 8px; }
    .kpi-change { font-family: var(--font-mono); font-size: 11px; display: inline-flex; align-items: center; gap: 4px; padding: 3px 7px; border-radius: 20px; }
    .kpi-change.up   { background: rgba(200,240,96,0.12); color: var(--accent); }
    .kpi-change.down { background: rgba(240,96,96,0.12); color: var(--danger); }

    .grid2 { display: grid; grid-template-columns: 1fr 340px; gap: 20px; margin-bottom: 20px; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 22px; }
    .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
    .card-title { font-size: 14px; font-weight: 600; letter-spacing: -0.2px; }
    .card-action { font-size: 12px; color: var(--accent); text-decoration: none; font-weight: 500; }
    .card-action:hover { opacity: 0.8; }

    .budget-list { display: flex; flex-direction: column; gap: 16px; }
    .budget-item-head { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 7px; }
    .budget-name { font-size: 13.5px; font-weight: 500; }
    .budget-nums { font-family: var(--font-mono); font-size: 12px; color: var(--muted); }
    .budget-nums b { color: var(--text); font-weight: 500; }
    .progress-track { height: 6px; background: var(--surface2); border-radius: 99px; overflow: hidden; }
    .progress-fill { height: 100%; border-radius: 99px; transition: width 0.4s ease; }
    .budget-dot { display: inline-block; width: 7px; height: 7px; border-radius: 50%; margin-right: 7px; }

    .tx-list { display: flex; flex-direction: column; gap: 2px; }
    .tx-item { display: flex; align-items: center; gap: 12px; padding: 10px; border-radius: 8px; transition: background 0.12s; }
    .tx-item:hover { background: var(--surface2); }
    .tx-icon { width: 36px; height: 36px; border-radius: 10px; background: var(--surface2); display: flex; align-items: center; justify-content: center; font-size: 17px; flex-shrink: 0; }
    .tx-info { flex: 1; min-width: 0; }
    .tx-name { font-size: 13.5px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .tx-meta { font-size: 11.5px; color: var(--muted); margin-top: 1px; }
    .tx-amount { font-family: var(--font-mono); font-size: 13px; font-weight: 500; flex-shrink: 0; }
    .tx-amount.expense { color: var(--danger); }
    .tx-amount.income  { color: var(--accent); }

    .chart-wrap { margin-top: 8px; }
    .chart-legend { display: flex; gap: 16px; margin-bottom: 14px; }
    .legend-item { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--muted); }
    .legend-dot { width: 8px; height: 8px; border-radius: 50%; }
    .bar-chart { display: flex; align-items: flex-end; gap: 6px; height: 100px; }
    .bar-group { flex: 1; display: flex; gap: 2px; align-items: flex-end; }
    .bar { flex: 1; border-radius: 4px 4px 0 0; min-height: 4px; }
    .bar.income-bar  { background: var(--accent); opacity: 0.8; }
    .bar.expense-bar { background: var(--accent2); opacity: 0.8; }
    .bar-labels { display: flex; gap: 6px; margin-top: 8px; }
    .bar-label { flex: 1; text-align: center; font-size: 10px; color: var(--muted); font-family: var(--font-mono); }

    .btn { display: inline-flex; align-items: center; gap: 7px; padding: 10px 18px; border-radius: 9px; font-size: 13.5px; font-weight: 600; font-family: var(--font-body); cursor: pointer; border: none; text-decoration: none; transition: all 0.15s; }
    .btn-primary { background: var(--accent); color: #0e0f11; }
    .btn-primary:hover { opacity: 0.88; transform: translateY(-1px); }

    /* Skeleton loader */
    .skeleton { background: linear-gradient(90deg, var(--surface2) 25%, var(--border) 50%, var(--surface2) 75%); background-size: 200% 100%; animation: shimmer 1.4s infinite; border-radius: 6px; }
    @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
    .skel-text { height: 14px; margin-bottom: 8px; }
    .skel-value { height: 32px; width: 60%; margin-bottom: 8px; }
    .skel-bar { height: 6px; }

    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 99px; }
  </style>
</head>
<body>

<aside class="sidebar">
  <div class="logo">fin<span>.</span>track</div>
  <nav class="nav-group">
    <div class="nav-label">Обзор</div>
    <a href="/" class="nav-item active"><span class="icon">◈</span> Дашборд</a>
    <a href="/budgets" class="nav-item"><span class="icon">◻</span> Бюджеты</a>
    <a href="/transactions" class="nav-item"><span class="icon">↕</span> Транзакции</a>
    <div class="nav-sep"></div>
    <div class="nav-label">Настройки</div>
  </nav>
  <div class="sidebar-bottom">
    <div class="user-card">
      <div class="avatar" id="user-avatar">—</div>
      <div>
        <div class="user-name" id="user-name">...</div>
        <div class="user-sub">Личный аккаунт</div>
      </div>
    </div>
  </div>
</aside>

<main class="main">

  <div class="page-header">
    <h1 class="page-title">
      Дашборд
      <span class="sub" id="welcome-text">Загрузка...</span>
    </h1>
    <div style="display:flex;gap:12px;align-items:center;">
      <div class="month-picker">
        <button id="prev-month">‹</button>
        <span class="cur-month" id="month-label">...</span>
        <button id="next-month">›</button>
      </div>
      <a href="/transactions/new" class="btn btn-primary">+ Транзакция</a>
    </div>
  </div>

  <!-- KPI -->
  <div class="kpi-row">
    <div class="kpi-card green">
      <div class="kpi-label">Баланс</div>
      <div class="kpi-value" id="kpi-balance"><div class="skeleton skel-value"></div></div>
    </div>
    <div class="kpi-card orange">
      <div class="kpi-label">Потрачено</div>
      <div class="kpi-value" id="kpi-spent"><div class="skeleton skel-value"></div></div>
    </div>
    <div class="kpi-card blue">
      <div class="kpi-label">Доходы</div>
      <div class="kpi-value" id="kpi-income"><div class="skeleton skel-value"></div></div>
    </div>
    <div class="kpi-card red">
      <div class="kpi-label">Перерасход бюджетов</div>
      <div class="kpi-value" id="kpi-overbudget"><div class="skeleton skel-value"></div></div>
      <div id="kpi-overbudget-names"></div>
    </div>
  </div>

  <div class="grid2">
    <!-- Budgets -->
    <div class="card">
      <div class="card-header">
        <span class="card-title">Бюджеты этого месяца</span>
        <a href="/budgets" class="card-action">Все бюджеты →</a>
      </div>
      <div class="budget-list" id="budget-list">
        <!-- skeleton -->
        <div class="skeleton skel-text"></div>
        <div class="skeleton skel-bar"></div>
        <div class="skeleton skel-text" style="margin-top:12px"></div>
        <div class="skeleton skel-bar"></div>
      </div>
    </div>

    <!-- Transactions -->
    <div class="card">
      <div class="card-header">
        <span class="card-title">Последние операции</span>
        <a href="/transactions" class="card-action">Все →</a>
      </div>
      <div class="tx-list" id="tx-list">
        <div class="skeleton skel-text"></div>
        <div class="skeleton skel-text"></div>
        <div class="skeleton skel-text"></div>
      </div>
    </div>
  </div>

  <!-- Bar chart -->
  <div class="card">
    <div class="card-header">
      <span class="card-title">Доходы vs Расходы — последние 6 месяцев</span>
    </div>
    <div class="chart-wrap">
      <div class="chart-legend">
        <div class="legend-item"><div class="legend-dot" style="background:var(--accent)"></div> Доходы</div>
        <div class="legend-item"><div class="legend-dot" style="background:var(--accent2)"></div> Расходы</div>
      </div>
      <div class="bar-chart" id="bar-chart"></div>
      <div class="bar-labels" id="bar-labels"></div>
    </div>
  </div>

</main>

<script>
  // ─── Утилиты ───────────────────────────────────────────────────
  const fmt = n => n.toLocaleString('ru-RU')

  function progressColor(pct) {
    if (pct >= 100) return 'var(--danger)'
    if (pct >= 75)  return 'var(--accent2)'
    return 'var(--accent)'
  }

  // ─── Рендер бюджетов ───────────────────────────────────────────
  function renderBudgets(budgets) {
    const list = document.getElementById('budget-list')
    list.innerHTML = budgets.map(b => {
      const pct = Math.min(Math.round(b.spent / b.limit * 100), 100)
      const color = progressColor(pct)
      return `
        <div class="budget-item">
          <div class="budget-item-head">
            <span class="budget-name">
              <span class="budget-dot" style="background:${color}"></span>${b.name}
            </span>
            <span class="budget-nums"><b>${fmt(b.spent)} ₽</b> / ${fmt(b.limit)} ₽</span>
          </div>
          <div class="progress-track">
            <div class="progress-fill" style="width:${pct}%; background:${color}"></div>
          </div>
        </div>`
    }).join('')
  }

  // ─── Рендер транзакций ─────────────────────────────────────────
  function renderTransactions(txs) {
    const list = document.getElementById('tx-list')
    list.innerHTML = txs.map(tx => `
      <div class="tx-item">
        <div class="tx-icon">${tx.icon}</div>
        <div class="tx-info">
          <div class="tx-name">${tx.name}</div>
          <div class="tx-meta">${tx.budget_name} · ${tx.date}</div>
        </div>
        <div class="tx-amount ${tx.is_income ? 'income' : 'expense'}">
          ${tx.is_income ? '+' : '−'}${fmt(tx.amount)} ₽
        </div>
      </div>`
    ).join('')
  }

  // ─── Рендер графика ────────────────────────────────────────────
  function renderChart(stats) {
    const maxIncome  = Math.max(...stats.map(s => s.income))
    const maxExpense = Math.max(...stats.map(s => s.expense))
    const maxVal = Math.max(maxIncome, maxExpense) || 1
    const MAX_H = 80

    document.getElementById('bar-chart').innerHTML = stats.map(s => `
      <div class="bar-group">
        <div class="bar income-bar"  style="height:${Math.round(s.income  / maxVal * MAX_H)}px"></div>
        <div class="bar expense-bar" style="height:${Math.round(s.expense / maxVal * MAX_H)}px"></div>
      </div>`
    ).join('')

    document.getElementById('bar-labels').innerHTML = stats.map(s =>
            `<div class="bar-label">${s.label}</div>`
    ).join('')
  }

  // ─── Рендер KPI ────────────────────────────────────────────────
  function renderKPI(data) {
    document.getElementById('kpi-balance').textContent    = fmt(data.balance) + ' ₽'
    document.getElementById('kpi-spent').textContent      = fmt(data.spent_in_month) + ' ₽'
    document.getElementById('kpi-income').textContent     = fmt(data.incomes) + ' ₽'
    document.getElementById('kpi-overbudget').textContent = data.over_budget_count

    const names = document.getElementById('kpi-overbudget-names')
    names.innerHTML = (data.over_budget_names || []).map(n =>
            `<span class="kpi-change down">${n}</span>`
    ).join(' ')
  }

  // ─── Загрузка данных ───────────────────────────────────────────
  async function loadDashboard(year, month) {
    try {
      const res = await fetch(`/api/dashboard?year=${year}&month=${month}`)
      if (!res.ok) throw new Error(res.statusText)
      const data = await res.json()

      // Хедер
      document.getElementById('welcome-text').textContent = `Добро пожаловать обратно, ${data.user_name}`
      document.getElementById('user-name').textContent    = data.user_name
      document.getElementById('user-avatar').textContent  = data.user_name.slice(0, 2).toUpperCase()
      document.getElementById('month-label').textContent  = data.month_period

      renderKPI(data)
      renderBudgets(data.budgets)
      renderTransactions(data.transactions)
      renderChart(data.monthly_stats)

    } catch (err) {
      console.error('Ошибка загрузки дашборда:', err)
    }
  }

  // ─── Переключение месяца ───────────────────────────────────────
  let currentYear  = new Date().getFullYear()
  let currentMonth = new Date().getMonth() + 1

  document.getElementById('prev-month').addEventListener('click', () => {
    currentMonth--
    if (currentMonth < 1) { currentMonth = 12; currentYear-- }
    loadDashboard(currentYear, currentMonth)
  })

  document.getElementById('next-month').addEventListener('click', () => {
    currentMonth++
    if (currentMonth > 12) { currentMonth = 1; currentYear++ }
    loadDashboard(currentYear, currentMonth)
  })

  // ─── Старт ─────────────────────────────────────────────────────
  loadDashboard(currentYear, currentMonth)
</script>

</body>
</html>
